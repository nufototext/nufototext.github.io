<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nufototext</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Einfaches Grundlayout für die Kategorien */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        h1 {
            margin-bottom: 30px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .category {
            cursor: pointer;
            margin: 10px;
        }
        .category img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            border: 1px solid #ddd;
        }
        .category p {
            margin-top: 5px;
            font-weight: bold;
        }
        .image-grid {
            display: none; /* Standardmäßig ausgeblendet */
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .image-grid img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>nufototext - welcome!</h1>

    <!-- Kategorien mit Aufhängerbildern -->
    <div class="gallery">
        <!-- Cityscape -->
        <div class="category" onclick="showImages('cityscape')">
            <img src="cityscape-1.jpg" alt="Cityscape">
            <p>cityscape</p>
        </div>

        <!-- Nature -->
        <div class="category" onclick="showImages('nature')">
            <img src="nature-1.jpg" alt="Nature">
            <p>nature</p>
        </div>

        <!-- Stage -->
        <div class="category" onclick="showImages('stage')">
            <img src="stage-1.jpg" alt="Stage">
            <p>stage</p>
        </div>

        <!-- People -->
        <div class="category" onclick="showImages('people')">
            <img src="people-1.jpg" alt="People">
            <p>people</p>
        </div>
    </div>

    <!-- Platzhalter für die Bildgalerien (unsichtbar, bis geklickt wird) -->
    <div id="cityscape-images" class="image-grid">
        <img src="cityscape-1.jpg" alt="Cityscape 1">
        <img src="cityscape-2.jpg" alt="Cityscape 2">
        <img src="cityscape-3.jpg" alt="Cityscape 3">
        <img src="cityscape-4.jpg" alt="Cityscape 4">
        <img src="cityscape-5.jpg" alt="Cityscape 5">
        <img src="cityscape-6.jpg" alt="Cityscape 6">
        <img src="cityscape-7.jpg" alt="Cityscape 7">
        <img src="cityscape-8.jpg" alt="Cityscape 8">
        <img src="cityscape-9.jpg" alt="Cityscape 9">
        <img src="cityscape-10.jpg" alt="Cityscape 10">
    </div>

    <div id="nature-images" class="image-grid">
        <img src="nature-1.jpg" alt="Nature 1">
        <img src="nature-2.jpg" alt="Nature 2">
        <img src="nature-3.jpg" alt="Nature 3">
        <img src="nature-4.jpg" alt="Nature 4">
        <img src="nature-5.jpg" alt="Nature 5">
        <img src="nature-6.jpg" alt="Nature 6">
        <img src="nature-7.jpg" alt="Nature 7">
        <img src="nature-8.jpg" alt="Nature 8">
        <img src="nature-9.jpg" alt="Nature 9">
        <img src="nature-10.jpg" alt="Nature 10">
    </div>

    <div id="stage-images" class="image-grid">
        <img src="stage-1.jpg" alt="Stage 1">
        <img src="stage-2.jpg" alt="Stage 2">
        <img src="stage-3.jpg" alt="Stage 3">
        <img src="stage-4.jpg" alt="Stage 4">
        <img src="stage-5.jpg" alt="Stage 5">
        <img src="stage-6.jpg" alt="Stage 6">
        <img src="stage-7.jpg" alt="Stage 7">
        <img src="stage-8.jpg" alt="Stage 8">
        <img src="stage-9.jpg" alt="Stage 9">
        <img src="stage-10.jpg" alt="Stage 10">
    </div>

    <div id="people-images" class="image-grid">
        <img src="people-1.jpg" alt="People 1">
        <img src="people-2.jpg" alt="People 2">
        <img src="people-3.jpg" alt="People 3">
        <img src="people-4.jpg" alt="People 4">
        <img src="people-5.jpg" alt="People 5">
        <img src="people-6.jpg" alt="People 6">
        <img src="people-7.jpg" alt="People 7">
        <img src="people-8.jpg" alt="People 8">
        <img src="people-9.jpg" alt="People 9">
        <img src="people-10.jpg" alt="People 10">
    </div>

    <script>
        // Funktion zum Anzeigen der Bilder einer Kategorie
        function showImages(category) {
            // Alle Bildgalerien ausblenden
            document.querySelectorAll('.image-grid').forEach(function(grid) {
                grid.style.display = 'none';
            });

            // Die gewählte Galerie anzeigen
            document.getElementById(category + '-images').style.display = 'flex';
        }
    </script>
</body>
</html>
