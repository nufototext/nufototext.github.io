<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nufototext</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            background-color: #2a2a2a;
            color: #ffffff;
        }
        h1 {
            margin-bottom: 30px;
            color: #ffffff;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .category {
            cursor: pointer;
            margin: 10px;
        }
        .category img {
            max-width: 200px;
            height: auto;
            border: 1px solid #555;
        }
        .category p {
            margin-top: 5px;
            font-weight: bold;
        }
        .category p.cityscape {
            color: #cccccc;
        }
        .category p.nature {
            color: #77ff77;
        }
        .category p.stage {
            color: #ffff77;
        }
        .category p.people {
            color: #ff9944;
        }
        .image-grid {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            align-items: flex-start;
            padding: 15px;
        }
        .image-grid img {
            max-width: 150px;
            height: auto;
            border: 1px solid #555;
            cursor: pointer;
        }
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            touch-action: pan-y;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 90%;
        }
        #lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
        .category-placeholder {
            width: 200px;
            height: 150px;
            background-color: #444;
            border: 1px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #999;
        }
        #lightbox-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        #lightbox-prev, #lightbox-next {
            pointer-events: all;
            color: white;
            font-size: 30px;
            cursor: pointer;
            padding: 0 20px;
            user-select: none;
        }
        #lightbox-prev { margin-left: 10px; }
        #lightbox-next { margin-right: 10px; }
        #lightbox-prev:hover, #lightbox-next:hover {
            opacity: 0.8;
        }
        /* Zurück-Button */
        .back-button {
            display: none;
            margin: 20px 0;
            padding: 10px 20px;
            background-color: #444;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .back-button:hover {
            background-color: #555;
        }
        /* Rahmen für die Voransichtsreihe in Kategorie-Farbe */
        #cityscape-images {
            border: 2px solid #cccccc;
        }
        #nature-images {
            border: 2px solid #77ff77;
        }
        #stage-images {
            border: 2px solid #ffff77;
        }
        #people-images {
            border: 2px solid #ff9944;
        }
    </style>
</head>
<body>
    <h1>nufototext - welcome!</h1>

    <button class="back-button" id="back-button" onclick="showMainGallery()">← back to overview</button>

    <!-- Kategorien mit dynamischen Hauptbildern -->
    <div class="gallery" id="main-gallery">
        <div class="category" onclick="showImages('cityscape')">
            <img src="assets/images/cityscape/cityscape-1.webp" alt="cityscape" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">No image</div>
            <p class="cityscape">cityscape</p>
        </div>
        <div class="category" onclick="showImages('nature')">
            <img src="assets/images/nature/nature-1.webp" alt="nature" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">No image</div>
            <p class="nature">nature</p>
        </div>
        <div class="category" onclick="showImages('stage')">
            <img src="assets/images/stage/stage-1.webp" alt="stage" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">No image</div>
            <p class="stage">stage</p>
        </div>
        <div class="category" onclick="showImages('people')">
            <img src="assets/images/people/people-1.webp" alt="people" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">No image</div>
            <p class="people">people</p>
        </div>
    </div>

    <!-- Leere Container für die Bildgalerien -->
    <div id="cityscape-images" class="image-grid"></div>
    <div id="nature-images" class="image-grid"></div>
    <div id="stage-images" class="image-grid"></div>
    <div id="people-images" class="image-grid"></div>

    <!-- Lightbox -->
    <div id="lightbox" onclick="closeLightbox()">
        <span id="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span id="lightbox-nav">
            <span id="lightbox-prev" onclick="event.stopPropagation(); navigateLightbox(-1);">&#10094;</span>
            <span id="lightbox-next" onclick="event.stopPropagation(); navigateLightbox(1);">&#10095;</span>
        </span>
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        // Aktuelle Kategorie und Bildindex für Navigation
        let currentCategory = '';
        let currentImageIndex = 0;
        let currentImages = [];

        // Funktion zum Anzeigen der Bilder einer Kategorie
        function showImages(category) {
            // Hauptgalerie ausblenden
            document.getElementById('main-gallery').style.display = 'none';
            
            // Alle Bildgalerien ausblenden
            document.querySelectorAll('.image-grid').forEach(function(grid) {
                grid.style.display = 'none';
            });

            // Zurück-Button anzeigen
            document.getElementById('back-button').style.display = 'inline-block';

            const grid = document.getElementById(category + '-images');
            grid.style.display = 'flex';
            grid.innerHTML = '';

            // Bilder für diese Kategorie laden
            const images = [];
            for (let i = 1; i <= 100; i++) {
                const imgUrl = `assets/images/${category}/${category}-${i}.webp`;
                const img = new Image();
                img.src = imgUrl;
                img.alt = `${category} ${i}`;
                img.onload = function() {
                    img.onclick = function() {
                        // Finde den Index des aktuellen Bildes
                        const index = images.indexOf(imgUrl);
                        openLightbox(imgUrl, category, index, images);
                    };
                    img.style.maxWidth = '150px';
                    img.style.height = 'auto';
                    grid.appendChild(img);
                };
                img.onerror = function() {
                    if (i > 5 && !grid.querySelector('img')) {
                        grid.innerHTML = '<p>No images in this category.</p>';
                    }
                };
                images.push(imgUrl);
            }
        }

        // Funktion zum Zurücksetzen zur Hauptansicht
        function showMainGallery() {
            document.getElementById('main-gallery').style.display = 'flex';
            document.querySelectorAll('.image-grid').forEach(function(grid) {
                grid.style.display = 'none';
            });
            // Zurück-Button ausblenden
            document.getElementById('back-button').style.display = 'none';
        }

        // Lightbox-Funktionen
        function openLightbox(src, category, index, images) {
            currentCategory = category;
            currentImageIndex = index;
            currentImages = images;
            
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = '';
        }

        // Navigation in der Lightbox
        function navigateLightbox(direction) {
            currentImageIndex += direction;
            
            // Begrenze den Index
            if (currentImageIndex < 0) {
                currentImageIndex = currentImages.length - 1;
            } else if (currentImageIndex >= currentImages.length) {
                currentImageIndex = 0;
            }
            
            if (currentImages[currentImageIndex]) {
                document.getElementById('lightbox-img').src = currentImages[currentImageIndex];
            }
        }

        // Tastatursteuerung
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === 'Escape') {
                    closeLightbox();
                } else if (e.key === 'ArrowLeft') {
                    navigateLightbox(-1);
                } else if (e.key === 'ArrowRight') {
                    navigateLightbox(1);
                }
            }
        });

        // Touch-Navigation für Smartphones
        let touchStartX = 0;
        let touchEndX = 0;

        document.getElementById('lightbox').addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        }, false);

        document.getElementById('lightbox').addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            const swipeThreshold = 50; // Mindestdistanz für Wischen
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    // Wischen nach links -> nächstes Bild
                    navigateLightbox(1);
                } else {
                    // Wischen nach rechts -> vorheriges Bild
                    navigateLightbox(-1);
                }
            }
        }
    </script>
</body>
</html>
