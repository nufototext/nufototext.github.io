<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta-Tags -->
    <meta name="description" content="Fotogalerie von nufototext – Entdecke unsere Sammlung von Stadtlandschaften, Naturaufnahmen, Bühnenbildern und Porträts.">
    <meta name="keywords" content="Fotografie, Stadtlandschaft, Natur, Bühne, Menschen, Galerie, nufototext">
    <meta name="author" content="nufototext">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="nufototext – Fotogalerie">
    <meta property="og:description" content="Entdecke unsere Fotogalerie mit Kategorien wie Stadtlandschaften, Natur, Bühnen und Menschen.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nufototext.github.io">
    <meta property="og:image" content="https://nufototext.github.io/assets/images/cityscape/cityscape-1.webp">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="nufototext – Fotogalerie">
    <meta name="twitter:description" content="Entdecke unsere Fotogalerie mit Kategorien wie Stadtlandschaften, Natur, Bühnen und Menschen.">
    <meta name="twitter:image" content="https://nufototext.github.io/assets/images/cityscape/cityscape-1.webp">
    
    <!-- Favicon (optional, kann später hinzugefügt werden) -->
    <link rel="icon" type="image/webp" href="assets/images/favicon.webp">
    
    <title>nufototext – Fotogalerie</title>
    
    <!-- Externe Stylesheets -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <h1>nufototext – Fotogalerie</h1>

    <!-- Kategorien mit dynamischen Hauptbildern -->
    <div class="gallery">
        <div class="category" onclick="showImages('cityscape')">
            <img src="" alt="Stadtlandschaft" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">Kein Bild</div>
            <p>Stadtlandschaften</p>
        </div>
        <div class="category" onclick="showImages('nature')">
            <img src="" alt="Natur" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">Kein Bild</div>
            <p>Natur</p>
        </div>
        <div class="category" onclick="showImages('stage')">
            <img src="" alt="Bühne" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">Kein Bild</div>
            <p>Bühne</p>
        </div>
        <div class="category" onclick="showImages('people')">
            <img src="" alt="Menschen" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">Kein Bild</div>
            <p>Menschen</p>
        </div>
    </div>

    <!-- Leere Container für die Bildgalerien -->
    <div id="cityscape-images" class="image-grid"></div>
    <div id="nature-images" class="image-grid"></div>
    <div id="stage-images" class="image-grid"></div>
    <div id="people-images" class="image-grid"></div>

    <!-- Lightbox -->
    <div id="lightbox">
        <span id="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Vergrößertes Bild">
    </div>

    <!-- Externes JavaScript -->
    <script src="assets/js/script.js"></script>
</body>
</html>
