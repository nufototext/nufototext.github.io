<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nufototext</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        h1 {
            margin-bottom: 30px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .category {
            cursor: pointer;
            margin: 10px;
        }
        .category img {
            max-width: 200px;
            height: auto; /* Behält das ursprüngliche Seitenverhältnis bei */
            border: 1px solid #ddd;
        }
        .category p {
            margin-top: 5px;
            font-weight: bold;
        }
        .image-grid {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            align-items: flex-start; /* Verhindert, dass Bilder gestreckt werden */
        }
        .image-grid img {
            max-width: 150px;
            height: auto; /* Behält das ursprüngliche Seitenverhältnis bei */
            border: 1px solid #ddd;
            cursor: pointer;
        }

        /* Lightbox-Stil */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        #lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>nufototext - welcome!</h1>

    <!-- Kategorien mit Aufhängerbildern -->
    <div class="gallery">
        <div class="category" onclick="showImages('cityscape')">
            <img src="cityscape-1.jpg" alt="Cityscape">
            <p>cityscape</p>
        </div>
        <div class="category" onclick="showImages('nature')">
            <img src="nature-1.jpg" alt="Nature">
            <p>nature</p>
        </div>
        <div class="category" onclick="showImages('stage')">
            <img src="stage-1.jpg" alt="Stage">
            <p>stage</p>
        </div>
        <div class="category" onclick="showImages('people')">
            <img src="people-1.jpg" alt="People">
            <p>people</p>
        </div>
    </div>

    <!-- Leere Container für die Bildgalerien (werden dynamisch gefüllt) -->
    <div id="cityscape-images" class="image-grid"></div>
    <div id="nature-images" class="image-grid"></div>
    <div id="stage-images" class="image-grid"></div>
    <div id="people-images" class="image-grid"></div>

    <!-- Lightbox für große Bilder -->
    <div id="lightbox" onclick="closeLightbox()">
        <span id="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="" alt="Vergrößertes Bild">
    </div>

    <script>
        // Funktion zum Anzeigen der Bilder einer Kategorie
        function showImages(category) {
            // Alle Bildgalerien ausblenden
            document.querySelectorAll('.image-grid').forEach(function(grid) {
                grid.style.display = 'none';
            });

            // Die gewählte Galerie anzeigen und dynamisch füllen
            const grid = document.getElementById(category + '-images');
            grid.style.display = 'flex';
            grid.innerHTML = ''; // Leeren, falls bereits Bilder geladen wurden

            // Bilder dynamisch laden (ab 1 bis maximal 100)
            for (let i = 1; i <= 100; i++) {
                const img = new Image();
                img.src = `${category}-${i}.jpg`;
                img.alt = `${category} ${i}`;
                img.onerror = function() {
                    // Bild existiert nicht – Abbruch nach 5 aufeinanderfolgenden Fehlern
                    if (i > 5 && !grid.querySelector('img')) {
                        grid.innerHTML = '<p>Keine Bilder in dieser Kategorie.</p>';
                    }
                    return;
                };
                img.onload = function() {
                    img.onclick = function() { openLightbox(this.src); };
                    img.style.maxWidth = '150px';
                    img.style.height = 'auto';
                    grid.appendChild(img);
                };
            }
        }

        // Lightbox-Funktionen
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>
</body>
</html>
