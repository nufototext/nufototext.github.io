<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nufototext</title>
    
    <!-- Externe Stylesheets -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <h1>nufototext - welcome!</h1>

    <button class="back-button" id="back-button" onclick="showMainGallery()">← back to overview</button>

    <!-- Kategorien mit dynamischen Hauptbildern -->
    <div class="gallery" id="main-gallery">
        <div class="category" onclick="showImages('cityscape')">
            <img src="assets/images/cityscape/cityscape-001.webp" alt="cityscape" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">No image</div>
            <p class="cityscape">cityscape</p>
        </div>
        <div class="category" onclick="showImages('nature')">
            <img src="assets/images/nature/nature-001.webp" alt="nature" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">No image</div>
            <p class="nature">nature</p>
        </div>
        <div class="category" onclick="showImages('stage')">
            <img src="assets/images/stage/stage-001.webp" alt="stage" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">No image</div>
            <p class="stage">stage</p>
        </div>
        <div class="category" onclick="showImages('people')">
            <img src="assets/images/people/people-001.webp" alt="people" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="category-placeholder" style="display: none;">No image</div>
            <p class="people">people</p>
        </div>
    </div>

    <!-- Leere Container für die Bildgalerien -->
    <div id="cityscape-images" class="image-grid"></div>
    <div id="nature-images" class="image-grid"></div>
    <div id="stage-images" class="image-grid"></div>
    <div id="people-images" class="image-grid"></div>

    <!-- Zweite "back to overview"-Schaltfläche unten -->
    <button class="back-button" id="back-button-bottom" onclick="showMainGallery()" style="display: none;">← back to overview</button>

    <!-- Lightbox -->
    <div id="lightbox" onclick="closeLightbox()">
        <span id="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span id="lightbox-nav">
            <span id="lightbox-prev" onclick="event.stopPropagation(); navigateLightbox(-1);">&#10094;</span>
            <span id="lightbox-next" onclick="event.stopPropagation(); navigateLightbox(1);">&#10095;</span>
        </span>
        <img id="lightbox-img" src="" alt="">
    </div>

    <!-- Externes JavaScript -->
    <script src="assets/js/script.js"></script>
</body>
</html>
