name: Optimize Images to WebP

on:
  push:
    paths:
      - 'assets/images/**/*.jpg'
      - 'assets/images/**/*.jpeg'
      - 'assets/images/**/*.png'

jobs:
  optimize:
    name: Convert images to WebP
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Convert images to WebP
        run: |
          python3 << 'EOF'
          import os
          from PIL import Image

          quality = 75
          for root, _, files in os.walk('assets/images'):
              for file in files:
                  if file.lower().endswith(('.jpg', '.jpeg', '.png')):
                      img_path = os.path.join(root, file)
                      webp_path = os.path.join(root, file.rsplit('.', 1)[0] + '.webp')
                      
                      try:
                          img = Image.open(img_path)
                          if img.mode in ('RGBA', 'LA', 'P'):
                              img = img.convert('RGB')
                          img.save(webp_path, 'WEBP', quality=quality)
                          print(f'✅ Converted: {img_path} -> {webp_path}')
                          
                          # Remove original JPG/PNG after successful conversion
                          os.remove(img_path)
                          print(f'🗑️  Removed: {img_path}')
                      except Exception as e:
                          print(f'❌ Error processing {img_path}: {e}')
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes to commit
          if git status --porcelain | grep -q '.webp'; then
            git add .
            git commit -m "🤖 Auto-optimize images to WebP"
            git push
          else
            echo "No WebP changes to commit"
          fi
